<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | InvoiceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: "#2563EB"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-blue-50 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-6xl items-center px-6 py-12">
    <div class="grid w-full overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-2xl shadow-slate-200/60 lg:grid-cols-2">
      <section class="hidden bg-slate-900 p-12 text-white lg:block">
        <p class="text-sm uppercase tracking-[0.3em] text-blue-200">InvoiceFlow</p>
        <h1 class="mt-6 text-4xl font-semibold leading-tight">Stay on top of invoices, payments, and cash flow.</h1>
        <p class="mt-6 max-w-md text-slate-300">Log in to create invoices, manage subscriptions, export polished PDFs, and keep your invoicing system moving.</p>
      </section>
      <section class="p-8 md:p-12">
        <a href="/" class="text-sm font-medium text-brand">← Back to home</a>
        <h2 class="mt-6 text-3xl font-semibold">Welcome back</h2>
        <p class="mt-2 text-slate-600">Sign in to your account.</p>
        <form id="login-form" class="mt-8 space-y-5">
          <div>
            <label class="mb-2 block text-sm font-medium">Email</label>
            <input name="email" type="email" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-500" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium">Password</label>
            <input name="password" type="password" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-500" />
          </div>
          <button class="w-full rounded-2xl bg-brand px-5 py-3 font-medium text-white shadow-lg shadow-blue-200">Login</button>
        </form>
        <p class="mt-6 text-sm text-slate-600">New here? <a href="/register.html" class="font-medium text-brand">Create an account</a></p>
        <p id="message" class="mt-4 text-sm"></p>
      </section>
    </div>
  </main>
  <script src="/js/shared.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
